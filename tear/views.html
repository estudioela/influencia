<!-- Telas da V2, uma por <template>. O shell (Index.html) tem um único
     ponto de montagem (#tear-view); app.html clona o template da rota ativa.
     Derivadas do protótipo stitch_1_v2/, reescritas sobre os tokens do
     Design System: o Tailwind via CDN do protótipo não sobe para o
     Apps Script (compila no cliente e é frágil sob o sandbox do iframe). -->

<template id="view-login">
  <section>
    <form id="tear-form-login" class="tear-form">
      <div class="tear-campo">
        <label class="tear-campo__label" for="tear-cupom">cupom</label>
        <input class="tear-campo__input" id="tear-cupom" name="cupom" autocomplete="username" required>
      </div>
      <div class="tear-campo">
        <label class="tear-campo__label" for="tear-senha">senha</label>
        <input class="tear-campo__input" id="tear-senha" name="senha" type="password" autocomplete="current-password" required>
      </div>
      <p id="tear-erro-login" class="tear-campo__erro" role="alert"></p>
      <button type="submit" class="tear-botao">entrar</button>
    </form>
  </section>
</template>

<template id="view-dashboard">
  <section>
    <p class="tear-card__meta ela-mb-sm">suas entregas do ciclo atual.</p>
    <div data-lista="pendencias"></div>
    <button type="button" class="tear-card" data-rota="briefing">
      <span class="tear-card__titulo">briefing do mês</span>
    </button>
  </section>
</template>

<template id="view-briefing">
  <section>
    <button type="button" class="tear-nav__item ela-mb-sm" data-rota="dashboard">← voltar</button>
    <div data-lista="briefing"></div>
  </section>
</template>

<template id="view-envio">
  <section>
    <button type="button" class="tear-nav__item ela-mb-sm" data-rota="dashboard">← voltar</button>
    <p class="tear-vazio">o envio de material entra na Etapa 6.</p>
  </section>
</template>

<template id="view-pagamentos">
  <section>
    <div data-lista="pagamentos"></div>
  </section>
</template>

<template id="view-historico">
  <section>
    <div data-lista="historico"></div>
  </section>
</template>

<template id="view-perfil">
  <section>
    <div data-campo="perfil"></div>
    <button type="button" class="tear-botao ela-mt-md" data-acao="sair">sair</button>
  </section>
</template>
