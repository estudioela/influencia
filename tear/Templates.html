<!-- ═══════════════ app.html ═══════════════ -->
<script>
/**
 * Lógica de APRESENTAÇÃO da V2. Não conhece regra de negócio nem planilha.
 *
 * Etapa 1: os dados são simulados aqui no cliente. A partir da Etapa 4 cada
 * tela troca DADOS_MOCK por google.script.run → AtivacaoController, mantendo
 * intactas as funções de render — é por isso que elas recebem os dados por
 * parâmetro e devolvem string, sem ler nada de fora.
 */

var ROTAS = {
  login:      { titulo: 'entrar',      template: 'view-login'      },
  dashboard:  { titulo: 'painel',      template: 'view-dashboard'  },
  briefing:   { titulo: 'briefing',    template: 'view-briefing'   },
  envio:      { titulo: 'envio',       template: 'view-envio'      },
  pagamentos: { titulo: 'pagamentos',  template: 'view-pagamentos' },
  historico:  { titulo: 'histórico',   template: 'view-historico'  },
  perfil:     { titulo: 'perfil',      template: 'view-perfil'     }
};

var ROTA_PADRAO = 'dashboard';

/** Só estas aparecem na bottom nav; briefing e envio são alcançados pelo painel. */
var ROTAS_DO_NAV = ['dashboard', 'pagamentos', 'historico', 'perfil'];

function ehRotaValida(nome) {
  return Object.prototype.hasOwnProperty.call(ROTAS, String(nome));
}

function resolverRota(nome) {
  return ehRotaValida(nome) ? String(nome) : ROTA_PADRAO;
}

function tituloDaRota(nome) {
  return ROTAS[resolverRota(nome)].titulo;
}

/**
 * Todo dado exibido vem, mais cedo ou mais tarde, de célula de planilha —
 * editável por terceiros. Interpolar sem escapar é injeção.
 */
function escaparHtml(valor) {
  return String(valor === null || valor === undefined ? '' : valor)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderizarVazio(mensagem) {
  return '<p class="tear-vazio">' + escaparHtml(mensagem) + '</p>';
}

function renderizarPendencias(itens) {
  if (!itens || !itens.length) return renderizarVazio('nenhuma entrega pendente.');

  return itens.map(function (item) {
    return '<article class="tear-card">' +
             '<div class="tear-card__titulo">' + escaparHtml(item.formato) + '</div>' +
             '<div class="tear-card__meta">' + escaparHtml(item.ciclo) + '</div>' +
             '<span class="tear-badge tear-badge--ativo">' + escaparHtml(item.estado) + '</span>' +
           '</article>';
  }).join('');
}

function renderizarPagamentos(itens) {
  if (!itens || !itens.length) return renderizarVazio('nenhum pagamento no período.');

  return itens.map(function (item) {
    return '<article class="tear-card">' +
             '<div class="tear-card__titulo">' + escaparHtml(item.ciclo) + '</div>' +
             '<div class="tear-card__meta">' + escaparHtml(item.valor) + '</div>' +
             '<span class="tear-badge">' + escaparHtml(item.estado) + '</span>' +
           '</article>';
  }).join('');
}

function renderizarHistorico(itens) {
  if (!itens || !itens.length) return renderizarVazio('nada arquivado ainda.');

  return itens.map(function (item) {
    return '<article class="tear-card">' +
             '<div class="tear-card__titulo">' + escaparHtml(item.formato) + '</div>' +
             '<div class="tear-card__meta">' + escaparHtml(item.ciclo) + '</div>' +
           '</article>';
  }).join('');
}

/**
 * A V2 não tem aba de briefing: `Link_Briefing` é uma coluna da ativação.
 * A tela lista, por entrega, o link do briefing correspondente.
 */
function renderizarBriefing(itens) {
  if (!itens || !itens.length) return renderizarVazio('sem briefing para o ciclo.');

  return itens.map(function (item) {
    var corpo = item.link
      ? '<a class="tear-card__meta" href="' + escaparHtml(item.link) + '" target="_blank" rel="noopener noreferrer">abrir briefing</a>'
      : '<span class="tear-card__meta">briefing ainda não publicado</span>';

    return '<article class="tear-card">' +
             '<div class="tear-card__titulo">' + escaparHtml(item.formato) + '</div>' +
             corpo +
           '</article>';
  }).join('');
}

/* A V2 não guarda e-mail, PIX nem endereço: o perfil é somente leitura do que
   `Parceiros_Influenciadoras` de fato tem. */
var CAMPOS_DO_PERFIL = [
  { chave: 'nome', rotulo: 'nome' },
  { chave: 'statusContrato', rotulo: 'contrato' },
  { chave: 'categoria', rotulo: 'categoria' }
];

function renderizarPerfil(perfil) {
  if (!perfil) return renderizarVazio('perfil indisponível.');

  return CAMPOS_DO_PERFIL.map(function (campo) {
    return '<div class="tear-card">' +
             '<div class="tear-card__meta">' + escaparHtml(campo.rotulo) + '</div>' +
             '<div class="tear-card__titulo">' + escaparHtml(perfil[campo.chave]) + '</div>' +
           '</div>';
  }).join('');
}

/* ── Dados simulados (Etapa 1) ────────────────────────────────────────────
   Nomes fictícios de propósito: este repositório é público. Nenhum dado real
   de influenciadora entra aqui. */
/* ── Sessão ───────────────────────────────────────────────────────────────
   `sessionStorage`, NUNCA `localStorage`: o token é um bearer puro (o servidor
   só faz `cache.get(token)`, sem binding de IP ou User-Agent). Persistir além
   da aba transforma token esquecido em sequestro de sessão. */
var CHAVE_SESSAO = 'tear.token';
var SESSAO = null;

function lerTokenPersistido() {
  return typeof sessionStorage === 'undefined' ? null : sessionStorage.getItem(CHAVE_SESSAO);
}

function persistirToken(token) {
  if (typeof sessionStorage === 'undefined') return;

  if (token) sessionStorage.setItem(CHAVE_SESSAO, token);
  else sessionStorage.removeItem(CHAVE_SESSAO);
}

function estaAutenticado() {
  return !!SESSAO;
}

function fazerLogin(cupom, senha) {
  return chamar('apiLogin', cupom, senha).then(function (resposta) {
    if (!resposta || !resposta.success) {
      throw new Error(resposta && resposta.error ? resposta.error : 'Não foi possível entrar.');
    }

    SESSAO = resposta.data;
    persistirToken(SESSAO.token);

    return SESSAO;
  });
}

function restaurarSessao() {
  var token = lerTokenPersistido();

  if (!temBackend() || !token) return Promise.resolve(false);

  return chamar('apiSessaoAtual', token)
    .then(function (resposta) {
      if (!resposta || !resposta.success) {
        persistirToken(null);
        return false;
      }

      SESSAO = { token: token, perfil: resposta.data };
      return true;
    })
    .catch(function () {
      return false;
    });
}

/**
 * Aguarda o servidor antes de limpar o token. Fire-and-forget deixaria o token
 * válido por 6h no servidor enquanto o cliente já o esqueceu — ninguém mais
 * poderia revogá-lo. A sessão local é encerrada mesmo se o servidor falhar.
 */
function sairDoApp() {
  var token = SESSAO ? SESSAO.token : lerTokenPersistido();

  var encerrarLocalmente = function () {
    SESSAO = null;
    persistirToken(null);
  };

  if (!temBackend() || !token) {
    encerrarLocalmente();
    return Promise.resolve();
  }

  return chamar('apiLogout', token).catch(function () {}).then(encerrarLocalmente);
}

var DADOS_MOCK = {
  pendencias: [
    { formato: 'reel',       ciclo: 'ciclo de julho', estado: 'aguardando material' },
    { formato: 'carrossel',  ciclo: 'ciclo de julho', estado: 'em aprovação' }
  ],
  pagamentos: [
    { ciclo: 'ciclo de junho', valor: 'R$ 0,00', estado: 'pago' },
    { ciclo: 'ciclo de julho', valor: 'R$ 0,00', estado: 'pendente' }
  ],
  historico: [
    { formato: 'stories', ciclo: 'ciclo de maio' }
  ],
  briefing: [{ formato: 'reel', link: '' }],
  perfil: { nome: 'influenciadora exemplo', statusContrato: 'ativo', categoria: 'moda' }
};

/* ── Ponte com o backend ──────────────────────────────────────────────────
   O ciclo ainda não é escolhido pela UI: a aba `Ciclos` existe no schema, mas
   não tem Repository. Enquanto CICLO_ATIVO for vazio, o painel cai no mock —
   é a Etapa 5 que traz o seletor. */
var CICLO_ATIVO = '';

function temBackend() {
  return typeof google !== 'undefined' && !!google.script && !!google.script.run;
}

/**
 * `google.script.run` é callback puro. Envolvê-lo em Promise mantém as telas
 * legíveis e concentra num lugar só o tratamento de falha de transporte —
 * que é diferente de falha de domínio: o Controller devolve `{success:false}`
 * para erro de negócio, e só um erro de infraestrutura chega no `withFailureHandler`.
 */
function chamar(nomeFuncao) {
  var argumentos = Array.prototype.slice.call(arguments, 1);

  return new Promise(function (resolver, rejeitar) {
    // `withSuccessHandler`/`withFailureHandler` devolvem um NOVO runner com os
    // handlers acoplados. Invocar a função com `.apply(null, ...)` descartaria
    // esse runner como `this`, e os handlers nunca seriam chamados: a Promise
    // ficaria pendente para sempre e a tela travaria em silêncio.
    var runner = google.script.run.withSuccessHandler(resolver).withFailureHandler(rejeitar);

    runner[nomeFuncao].apply(runner, argumentos);
  });
}

/** Traduz o DTO do domínio para o que o card do painel exibe. */
function pendenciaDeDto(dto) {
  return {
    formato: dto.tipoConteudo,
    ciclo: dto.idCiclo,
    estado: dto.estado
  };
}

function briefingDeDto(dto) {
  return { formato: dto.tipoConteudo, link: dto.linkBriefing };
}

/** `valorCache` vem cru da planilha; sem valor, não se inventa "R$ 0,00". */
function pagamentoDeDto(dto) {
  return {
    ciclo: dto.idCiclo,
    valor: dto.valorCache ? 'R$ ' + dto.valorCache : '—',
    estado: dto.estado
  };
}

function renderizarErro(mensagem) {
  return '<p class="tear-vazio tear-campo__erro">' + escaparHtml(mensagem) + '</p>';
}

/**
 * Busca as pendências no backend; se não houver backend (preview local) ou se
 * não houver ciclo escolhido, cai no mock e declara isso na tela. Um erro de
 * domínio é exibido como erro — nunca mascarado por dados simulados, senão a
 * tela mente sobre o estado do sistema.
 */
/** Um envelope que não tem a forma combinada é bug de contrato, não erro de negócio. */
function envelopeValido(resposta) {
  if (!resposta || typeof resposta.success !== 'boolean') return false;

  return !resposta.success || Array.isArray(resposta.data);
}

/**
 * Fábrica dos carregadores de lista por ciclo. Resolve com `true` quando os
 * dados vieram do backend (mesmo que como erro de domínio) e `false` quando a
 * tela caiu no mock — é isso que o banner de origem consome.
 */
/**
 * O servidor é a única autoridade sobre a validade da sessão: o cliente não
 * tem como saber que o token expirou antes de tentar usá-lo.
 */
function ehSessaoExpirada(mensagem) {
  return typeof mensagem === 'string' && mensagem.indexOf('Sessão expirada') === 0;
}

function tratarSessaoExpirada() {
  SESSAO = null;
  persistirToken(null);
  navegar('login');

  return true;
}

function carregadorDeCiclo(nomeApi, renderizarLista, mapearDto, mock) {
  return function (no) {
    if (!temBackend() || !estaAutenticado() || !CICLO_ATIVO) {
      // O mock já está no formato da view: não passa pelo mapeador de DTO.
      no.innerHTML = renderizarLista(mock());
      return Promise.resolve(false);
    }

    // O ciclo é capturado agora: se o usuário trocar de ciclo enquanto a
    // resposta está em voo, a resposta antiga não pode pintar a tela do novo.
    var cicloPedido = CICLO_ATIVO;

    return chamar(nomeApi, SESSAO.token, cicloPedido)
      .then(function (resposta) {
        if (CICLO_ATIVO !== cicloPedido) return true;

        if (!envelopeValido(resposta)) {
          no.innerHTML = renderizarErro('Resposta inesperada do servidor.');
          return true;
        }

        if (!resposta.success) {
          if (ehSessaoExpirada(resposta.error)) return tratarSessaoExpirada();

          no.innerHTML = renderizarErro(resposta.error);
          return true;
        }

        no.innerHTML = renderizarLista(resposta.data.map(mapearDto));
        return true;
      })
      .catch(function (erro) {
        // Só chega aqui falha de transporte: o erro de domínio vem dentro do
        // envelope. Rotular um bug de contrato como "falha de comunicação"
        // mandaria quem for depurar para o lado errado.
        no.innerHTML = renderizarErro('Falha de comunicação: ' + (erro && erro.message ? erro.message : erro));
        return true;
      });
  };
}

var carregarPendencias = carregadorDeCiclo(
  'apiListarAtivacoesDoCiclo', renderizarPendencias, pendenciaDeDto,
  function () { return DADOS_MOCK.pendencias; }
);

var carregarPagamentos = carregadorDeCiclo(
  'apiListarPagamentosDoCiclo', renderizarPagamentos, pagamentoDeDto,
  function () { return DADOS_MOCK.pagamentos; }
);

var carregarHistorico = carregadorDeCiclo(
  'apiListarHistoricoDoCiclo', renderizarHistorico, pendenciaDeDto,
  function () { return DADOS_MOCK.historico; }
);

var carregarBriefing = carregadorDeCiclo(
  'apiListarAtivacoesDoCiclo', renderizarBriefing, briefingDeDto,
  function () { return DADOS_MOCK.briefing; }
);

/** O perfil vem da sessão, não de uma chamada: o login já o devolveu. */
var RENDERIZADORES = {
  'campo:perfil': function () { return renderizarPerfil(SESSAO ? SESSAO.perfil : DADOS_MOCK.perfil); }
};

/** Slots que buscam dados de verdade. */
var CARREGADORES = {
  'lista:pendencias': carregarPendencias,
  'lista:pagamentos': carregarPagamentos,
  'lista:historico':  carregarHistorico,
  'lista:briefing':   carregarBriefing
};

/* ── Seleção de ciclo ─────────────────────────────────────────────────── */

function renderizarOpcoesCiclo(ciclos) {
  return ciclos
    .map(function (ciclo) {
      return '<option value="' + escaparHtml(ciclo.idCiclo) + '">' + escaparHtml(ciclo.nome) + '</option>';
    })
    .join('');
}

/**
 * Sem ciclo não há o que buscar: `apiListarAtivacoesDoCiclo` exige um.
 * Se a lista vier vazia (abas recém-criadas) o seletor fica escondido e a UI
 * segue no mock, em vez de disparar uma chamada que só voltaria com erro.
 */
function carregarCiclos() {
  if (!temBackend() || !estaAutenticado()) return Promise.resolve([]);

  return chamar('apiListarCiclos', SESSAO.token)
    .then(function (resposta) {
      if (!resposta.success || !resposta.data.length) return [];

      CICLO_ATIVO = resposta.data[0].idCiclo;

      var seletor = document.getElementById('tear-ciclo');
      seletor.innerHTML = renderizarOpcoesCiclo(resposta.data);
      seletor.hidden = false;

      return resposta.data;
    })
    .catch(function () {
      return [];
    });
}

/* ── Ligação com o DOM ──────────────────────────────────────────────────── */

/**
 * Devolve uma Promise que resolve com `true` se ALGUM slot da view veio do
 * backend. É isso que decide se o banner de "dados simulados" aparece.
 */
function preencherSlots(raiz) {
  var pendentes = [];

  ['lista', 'campo'].forEach(function (tipo) {
    var nos = raiz.querySelectorAll('[data-' + tipo + ']');

    Array.prototype.forEach.call(nos, function (no) {
      var chave = tipo + ':' + no.getAttribute('data-' + tipo);
      var carregar = CARREGADORES[chave];

      if (carregar) {
        // `Promise.resolve().then` converte um throw síncrono do carregador em
        // rejeição — senão ele escaparia de preencherSlots sem passar por catch.
        pendentes.push(Promise.resolve().then(function () { return carregar(no); }));
        return;
      }

      var renderizar = RENDERIZADORES[chave];
      if (renderizar) no.innerHTML = renderizar();
    });
  });

  return Promise.all(pendentes).then(function (origens) {
    return origens.length > 0 && origens.every(Boolean);
  });
}

function marcarOrigemDosDados(veioDoBackend) {
  var banner = document.getElementById('tear-origem');
  if (banner) banner.hidden = veioDoBackend;
}

var ROTA_ATUAL = ROTA_PADRAO;

function navegar(rotaPedida) {
  var rota = resolverRota(rotaPedida);
  var alvo = document.getElementById('tear-view');
  var modelo = document.getElementById(ROTAS[rota].template);

  ROTA_ATUAL = rota;

  alvo.innerHTML = '';
  alvo.appendChild(modelo.content.cloneNode(true));

  // Na tela de login não há navegação nem dados: esconder a nav evita que a
  // parceira alcance uma tela autenticada antes de entrar.
  var ehLogin = rota === 'login';
  document.querySelector('.tear-nav').hidden = ehLogin;

  if (ehLogin) {
    marcarOrigemDosDados(true); // nada a declarar: a tela não exibe dado nenhum
  } else {
    // Se o usuário navegar de novo antes de a resposta chegar, a view já é
    // outra: descartamos o resultado tardio em vez de escrever num nó fora da tela.
    preencherSlots(alvo)
      .then(function (veioDoBackend) {
        if (ROTA_ATUAL === rota) marcarOrigemDosDados(veioDoBackend);
      })
      .catch(function () {
        if (ROTA_ATUAL === rota) marcarOrigemDosDados(false);
      });
  }

  document.getElementById('tear-titulo').textContent = tituloDaRota(rota);

  var itens = document.querySelectorAll('.tear-nav__item[data-rota]');
  Array.prototype.forEach.call(itens, function (item) {
    if (item.getAttribute('data-rota') === rota) item.setAttribute('aria-current', 'page');
    else item.removeAttribute('aria-current');
  });
}

/** Depois de autenticar (ou sem backend): descobre os ciclos e abre o painel. */
function entrarNoApp() {
  return carregarCiclos().then(function () {
    navegar(ROTA_PADRAO);
  });
}

function tratarSubmitDeLogin(evento) {
  evento.preventDefault();

  var erro = document.getElementById('tear-erro-login');
  var botao = evento.target.querySelector('button[type="submit"]');

  erro.textContent = '';
  botao.disabled = true;

  fazerLogin(document.getElementById('tear-cupom').value, document.getElementById('tear-senha').value)
    .then(entrarNoApp)
    .catch(function (falha) {
      // `textContent`, não `innerHTML`: a mensagem vem do servidor.
      erro.textContent = falha && falha.message ? falha.message : 'Não foi possível entrar.';
      botao.disabled = false;
    });
}

function iniciarApp() {
  // Listener delegado: nenhum onclick inline, e funciona para os botões que
  // só existem depois que um template é clonado.
  document.addEventListener('click', function (evento) {
    var rota = evento.target.closest('[data-rota]');
    if (rota) return navegar(rota.getAttribute('data-rota'));

    if (evento.target.closest('[data-acao="sair"]')) {
      sairDoApp().then(function () { navegar('login'); });
    }
  });

  document.addEventListener('submit', function (evento) {
    if (evento.target.id === 'tear-form-login') tratarSubmitDeLogin(evento);
  });

  document.getElementById('tear-ciclo').addEventListener('change', function (evento) {
    CICLO_ATIVO = evento.target.value;
    navegar(ROTA_ATUAL);
  });

  // Sem backend (preview local) não há o que autenticar: a UI roda no mock.
  if (!temBackend()) return entrarNoApp();

  restaurarSessao().then(function (temSessao) {
    if (temSessao) return entrarNoApp();

    navegar('login');
  });
}

if (typeof document !== 'undefined') {
  document.addEventListener('DOMContentLoaded', iniciarApp);
}
</script>

<!-- ═══════════════ components_nav.html ═══════════════ -->
<!-- Bottom nav. Aparece em 6 das 7 telas do protótipo (ausente só no login).
     Sem handler inline: os itens carregam data-rota e um listener delegado em
     app.html cuida do clique. Ver design-system/adapters/apps-script.md. -->
<nav class="tear-nav" aria-label="Navegação principal">
  <button type="button" class="tear-nav__item" data-rota="dashboard">painel</button>
  <button type="button" class="tear-nav__item" data-rota="pagamentos">pagamentos</button>
  <button type="button" class="tear-nav__item" data-rota="historico">histórico</button>
  <button type="button" class="tear-nav__item" data-rota="perfil">perfil</button>
</nav>

<!-- ═══════════════ components_ui.html ═══════════════ -->
<style>
/* Componentes do Projeto Tear.
   Nenhum valor literal: tudo sai dos tokens de design-system/core/variables.css.
   Se faltar um token, crie o token — não escreva o valor aqui.

   Usa os tokens CANÔNICOS `--ela-*`, nunca os aliases de ponte do tema
   (`--bg`, `--primary`, `--text`…). Aquela ponte existe só para o
   `mae/Index.html` da V1, que ainda não migrou; o dia em que ela for removida,
   quem depender dela quebra sem erro nenhum, só com cor errada.
   Travado por test/styles-sync.test.js. */

/* Sem isto, `width: 100%` + padding + borda estoura o contêiner: os cards
   passavam da margem direita da tela. O núcleo do Design System não impõe
   box-sizing, para não sequestrar a página de quem o consome. */
.tear-shell,
.tear-shell *,
.tear-shell *::before,
.tear-shell *::after {
  box-sizing: border-box;
}

.tear-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ─────────────────────────────────────────────────────────── */
.tear-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--ela-color-background);
  border-bottom: 1px solid var(--ela-color-border-subtle);
}

/* ── Área da view ───────────────────────────────────────────────────── */
.tear-view {
  flex: 1;
  /* Espaço para a nav fixa não cobrir o último item da lista. */
  padding-bottom: calc(var(--ela-space-xl) + var(--ela-space-lg));
}

/* ── Card / item de lista ───────────────────────────────────────────── */
.tear-card {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--ela-color-surface);
  border: 1px solid var(--ela-color-border-subtle);
  border-radius: var(--ela-radius-none);
  padding: var(--ela-space-sm);
  margin-bottom: var(--ela-space-xs);
  transition: border-color var(--ela-duration-fast) var(--ela-easing-base);
}

.tear-card:hover,
.tear-card:focus-visible {
  border-color: var(--ela-color-accent);
}

.tear-card__titulo {
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-md);
  color: var(--ela-color-content);
}

.tear-card__meta {
  font-size: var(--ela-font-size-sm);
  color: var(--ela-color-content-muted);
}

/* ── Badge de estado ────────────────────────────────────────────────── */
.tear-badge {
  display: inline-block;
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-xs);
  letter-spacing: var(--ela-letter-spacing-wide);
  padding: var(--ela-space-3xs) var(--ela-space-2xs);
  border: 1px solid var(--ela-color-border-subtle);
  color: var(--ela-color-content-muted);
}

.tear-badge--ativo {
  border-color: var(--ela-color-accent);
  color: var(--ela-color-accent);
}

/* ── Estado vazio ───────────────────────────────────────────────────── */
.tear-vazio {
  text-align: center;
  color: var(--ela-color-content-faint);
  padding: var(--ela-space-lg) var(--ela-space-sm);
  font-size: var(--ela-font-size-sm);
}

/* ── Bottom nav ─────────────────────────────────────────────────────── */
.tear-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--portal-shell-mobile);
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: var(--ela-color-surface);
  border-top: 1px solid var(--ela-color-border-subtle);
  z-index: 20;
}

@media (min-width: 768px) {
  .tear-nav { max-width: var(--portal-shell-desktop); }
}

.tear-nav__item {
  flex: 1;
  background: none;
  border: 0;
  cursor: pointer;
  padding: var(--ela-space-xs) var(--ela-space-3xs);
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-xs);
  letter-spacing: var(--ela-letter-spacing-wide);
  color: var(--ela-color-content-muted);
  transition: color var(--ela-duration-fast) var(--ela-easing-base);
}

.tear-nav__item[aria-current="page"] {
  color: var(--ela-color-accent);
}

/* Banner de origem dos dados. Só aparece quando a tela cai no mock. */
.tear-mock {
  background: var(--ela-color-surface-container-high);
  color: var(--ela-color-content-muted);
  font-size: var(--ela-font-size-xs);
  letter-spacing: var(--ela-letter-spacing-wide);
  text-align: center;
  padding: var(--ela-space-3xs);
}

.tear-mock[hidden] {
  display: none;
}

/* ── Tracker de etapas (pagamentos) ─────────────────────────────────────
   `align-items: flex-start` é obrigatório. Nunca `center`: já foi causa raiz
   de um bug de alinhamento corrigido em produção — ver a "ARMADILHA CONHECIDA"
   em design-system/themes/portal.css. */
.tear-tracker {
  display: flex;
  flex-direction: column;
}

.tear-tracker__etapa {
  display: flex;
  align-items: flex-start;
  gap: var(--ela-space-sm);
}

.tear-tracker__trilho {
  display: flex;
  flex-direction: column;
  align-items: center;
  align-self: stretch;
}

.tear-tracker__marcador {
  flex-shrink: 0;
  width: var(--ela-space-md);
  height: var(--ela-space-md);
  border-radius: var(--ela-radius-circle);
  border: 1px solid var(--ela-color-accent);
  background: transparent;
}

.tear-tracker__linha {
  width: 1px;
  flex: 1;
  min-height: var(--ela-space-lg);
  margin: var(--ela-space-3xs) 0;
  background: var(--ela-color-border-subtle);
}

.tear-tracker__etapa--concluida .tear-tracker__marcador {
  background: var(--ela-color-accent);
}

/* A linha da última etapa não conecta a nada: some sem precisar de classe
   extra no markup. */
.tear-tracker__etapa:last-child .tear-tracker__linha {
  display: none;
}

.tear-tracker__conteudo {
  display: flex;
  flex-direction: column;
  padding-bottom: var(--ela-space-sm);
}

.tear-tracker__rotulo {
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-xs);
  letter-spacing: var(--ela-letter-spacing-wide);
  color: var(--ela-color-content);
}

.tear-tracker__meta {
  font-size: var(--ela-font-size-sm);
  color: var(--ela-color-content-muted);
}

/* ── Formulário ─────────────────────────────────────────────────────── */
.tear-form {
  display: flex;
  flex-direction: column;
  gap: var(--ela-space-sm);
}

.tear-campo {
  display: flex;
  flex-direction: column;
  gap: var(--ela-space-3xs);
}

.tear-campo__label {
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-xs);
  letter-spacing: var(--ela-letter-spacing-wide);
  color: var(--ela-color-content-muted);
}

.tear-campo__input {
  width: 100%;
  border: none;
  border-bottom: 1px solid var(--ela-color-border-subtle);
  background: transparent;
  padding: var(--ela-space-2xs) 0;
  font-family: var(--ela-font-body);
  font-size: var(--ela-font-size-md);
  color: var(--ela-color-content);
  transition: border-color var(--ela-duration-fast) var(--ela-easing-base);
}

.tear-campo__input:focus {
  outline: none;
  border-color: var(--ela-color-accent);
}

.tear-campo__erro {
  color: var(--ela-color-danger);
  font-size: var(--ela-font-size-xs);
}

/* ── Botão primário ─────────────────────────────────────────────────── */
.tear-botao {
  display: block;
  width: 100%;
  border: none;
  border-radius: var(--ela-radius-none);
  background: var(--ela-color-accent);
  color: var(--ela-color-content-on-accent);
  padding: var(--ela-space-sm) 0;
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-sm);
  letter-spacing: var(--ela-letter-spacing-wide);
  cursor: pointer;
  transition: background-color var(--ela-duration-fast) var(--ela-easing-base);
}

.tear-botao:hover,
.tear-botao:focus-visible {
  background: var(--ela-color-accent-strong);
}

.tear-botao:disabled {
  background: var(--ela-color-content-faint);
  cursor: not-allowed;
}

/* ── Dropzone de upload ─────────────────────────────────────────────── */
.tear-dropzone {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: var(--ela-space-xs);
  width: 100%;
  border: 1px dashed var(--ela-color-border-subtle);
  border-radius: var(--ela-radius-none);
  padding: var(--ela-space-lg) var(--ela-space-sm);
  cursor: pointer;
  transition: border-color var(--ela-duration-fast) var(--ela-easing-base),
    background-color var(--ela-duration-fast) var(--ela-easing-base);
}

.tear-dropzone.is-ativo {
  border-style: solid;
  border-color: var(--ela-color-accent);
  background: var(--ela-color-surface-container-low);
}

.tear-dropzone__titulo {
  font-family: var(--ela-font-label);
  font-size: var(--ela-font-size-md);
  color: var(--ela-color-content);
}

.tear-dropzone__legenda {
  font-size: var(--ela-font-size-sm);
  color: var(--ela-color-content-muted);
}
</style>

</template>

<template id="view-pagamentos">

  </section>
