<div class="flex-grow w-full px-margin-mobile md:px-margin-desktop py-stack-lg animate-fade-up">
  <div class="max-w-4xl mx-auto flex flex-col gap-stack-lg">
    <header class="flex justify-between items-center border-b border-outline/20 pb-stack-sm">
      <h2 class="font-label-sm text-label-sm text-on-surface-variant">pagamentos</h2>
      <div class="flex items-center gap-4">
        <button id="pag-mes-prev" class="text-on-surface-variant hover:text-secondary disabled:opacity-30 disabled:pointer-events-none transition-colors duration-300" aria-label="mês anterior">
          <span class="material-symbols-outlined text-[16px]">chevron_left</span>
        </button>
        <span id="pag-mes-label" class="font-meta-xs text-meta-xs text-outline uppercase tracking-widest">—</span>
        <button id="pag-mes-next" class="text-on-surface-variant hover:text-secondary disabled:opacity-30 disabled:pointer-events-none transition-colors duration-300" aria-label="próximo mês">
          <span class="material-symbols-outlined text-[16px]">chevron_right</span>
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-stack-lg">
      <div class="bg-surface-container p-stack-md rounded-lg">
        <div class="font-label-sm text-label-sm text-on-surface-variant">previsto</div>
        <div id="pag-total-previsto" class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg">R$ 0,00</div>
      </div>
      <div class="bg-surface-container p-stack-md rounded-lg">
        <div class="font-label-sm text-label-sm text-on-surface-variant">pago</div>
        <div id="pag-total-pago" class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg">R$ 0,00</div>
      </div>
    </div>

    <div id="pag-lista" class="pt-stack-md"></div>
  </div>
</div>
