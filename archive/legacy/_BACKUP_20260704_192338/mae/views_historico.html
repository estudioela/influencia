<div class="flex-grow w-full px-margin-mobile md:px-margin-desktop py-stack-lg animate-fade-up">
  <div class="max-w-4xl mx-auto flex flex-col gap-stack-lg">
    <header class="flex justify-between items-center border-b border-outline/20 pb-stack-sm">
      <h2 class="font-label-sm text-label-sm text-on-surface-variant">histórico</h2>
      <div class="flex items-center gap-4">
        <button id="hist-mes-prev" class="text-on-surface-variant hover:text-secondary disabled:opacity-30 disabled:pointer-events-none transition-colors duration-300" aria-label="mês anterior">
          <span class="material-symbols-outlined text-[16px]">chevron_left</span>
        </button>
        <span id="hist-mes-label" class="font-meta-xs text-meta-xs text-outline uppercase tracking-widest">—</span>
        <button id="hist-mes-next" class="text-on-surface-variant hover:text-secondary disabled:opacity-30 disabled:pointer-events-none transition-colors duration-300" aria-label="próximo mês">
          <span class="material-symbols-outlined text-[16px]">chevron_right</span>
        </button>
      </div>
    </header>

    <section>
      <h3 class="font-label-sm text-label-sm text-on-surface-variant">ativações</h3>
      <div id="hist-ativacoes" class="pt-stack-sm"></div>
    </section>

    <section class="pt-stack-lg">
      <h3 class="font-label-sm text-label-sm text-on-surface-variant">pagamentos</h3>
      <div id="hist-pagamentos" class="pt-stack-sm"></div>
    </section>
  </div>
</div>
