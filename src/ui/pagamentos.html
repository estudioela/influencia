<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('src/ui/portal-head') ?>
    <title>TEAR — Pagamentos</title>
  </head>
  <body>
    <main>
      <nav><a href="#" id="voltarAdmin">← Painel da equipe</a><button type="button" id="sair">Sair</button></nav>
      <h1>Pagamentos</h1>
      <p class="sub">Consulte obrigações, libere cobranças e confirme pagamentos recebidos.</p>
      <form id="filtro">
        <label for="mesReferencia">Competência<input id="mesReferencia" type="month" required /></label>
        <label for="parceiraId">Parceira (opcional)<input id="parceiraId" placeholder="INFLU_KEY" /></label>
        <button type="submit">Consultar pagamentos</button>
      </form>
      <p id="mensagem" role="status" aria-live="polite"></p>
      <section id="pagamentos"></section>
    </main>
    <script>
      var token = sessionStorage.getItem('tearPortalToken');
      var form = document.getElementById('filtro');
      var mensagem = document.getElementById('mensagem');
      var lista = document.getElementById('pagamentos');
      function navegarPara(pagina) { var base = window.top.location.href.split('?')[0]; window.top.location.href = base + '?pagina=' + pagina; }
      if (!token) navegarPara('portal-login');
      function avisar(texto) { mensagem.textContent = texto; }
      function dinheiro(valor) { return 'R$ ' + Number(valor || 0).toFixed(2).replace('.', ','); }
      function comando() { var dados = { token: token, mesReferencia: document.getElementById('mesReferencia').value }; var parceira = document.getElementById('parceiraId').value.trim(); if (parceira) dados.parceiraId = parceira; return dados; }
      function renderizar(itens) {
        lista.textContent = '';
        if (!itens.length) { avisar('Nenhum pagamento encontrado para esta competência.'); return; }
        itens.forEach(function (item) {
          var card = document.createElement('fieldset');
          var titulo = document.createElement('legend'); titulo.textContent = item.parceiraId + ' — ' + dinheiro(item.valor); card.appendChild(titulo);
          ['Tipo: ' + item.tipo, 'Estado: ' + item.estado, 'ID: ' + item.id].forEach(function (texto) { var p = document.createElement('p'); p.textContent = texto; card.appendChild(p); });
          if (item.estado === 'EmAberto' || item.estado === 'Aprovado') { var botao = document.createElement('button'); botao.type = 'button'; botao.textContent = item.estado === 'EmAberto' ? 'Liberar cobrança' : 'Confirmar pagamento'; botao.addEventListener('click', function () { executar(item, botao); }); card.appendChild(botao); }
          lista.appendChild(card);
        });
        avisar(itens.length + ' pagamento(s) encontrado(s).');
      }
      function carregar() { avisar('Carregando pagamentos…'); google.script.run.withSuccessHandler(function (resposta) { if (!resposta.success) return avisar(resposta.error.mensagem); renderizar(resposta.data); }).withFailureHandler(function (erro) { avisar(erro.message); }).listarPagamentos(comando()); }
      function executar(item, botao) { botao.disabled = true; avisar(item.estado === 'EmAberto' ? 'Liberando cobrança…' : 'Confirmando pagamento…'); var funcao = item.estado === 'EmAberto' ? 'liberarPagamento' : 'confirmarPagamento'; google.script.run.withSuccessHandler(function (resposta) { botao.disabled = false; if (!resposta.success) return avisar(resposta.error.mensagem); if (resposta.data.mensagem) window.prompt('Mensagem de cobrança — copie para enviar à parceira:', resposta.data.mensagem); avisar(item.estado === 'EmAberto' ? 'Cobrança liberada.' : 'Pagamento confirmado.'); carregar(); }).withFailureHandler(function (erro) { botao.disabled = false; avisar(erro.message); })[funcao]({ token: token, id: item.id }); }
      form.addEventListener('submit', function (evento) { evento.preventDefault(); carregar(); });
      document.getElementById('voltarAdmin').addEventListener('click', function (evento) { evento.preventDefault(); navegarPara('admin'); });
      document.getElementById('sair').addEventListener('click', function () { google.script.run.withSuccessHandler(function () { sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login'); }).withFailureHandler(function () { sessionStorage.removeItem('tearPortalToken'); navegarPara('portal-login'); }).sairDoPortal({ token: token }); });
    </script>
  </body>
</html>
