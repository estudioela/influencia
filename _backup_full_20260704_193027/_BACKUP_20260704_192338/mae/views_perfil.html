<div class="flex-grow w-full px-margin-mobile md:px-margin-desktop py-stack-lg animate-fade-up">
  <div class="max-w-3xl mx-auto flex flex-col gap-stack-lg">
    <section class="border-b border-outline/20 pb-stack-lg">
      <h2 class="font-label-sm text-label-sm text-on-surface-variant">seu perfil</h2>
      <div class="mt-4">
        <div id="perfil-nome" class="font-body-md text-body-md">—</div>
        <div id="perfil-cupom" class="font-meta-xs text-meta-xs text-on-surface-variant">cupom</div>
      </div>
    </section>

    <section>
      <div class="flex flex-col gap-4">
        <label class="font-label-sm text-label-sm text-on-surface-variant">chave pix</label>
        <input id="perfil-input-chavepix" class="border-b border-outline/20 bg-transparent py-2 px-0" />
        <label class="font-label-sm text-label-sm text-on-surface-variant">email</label>
        <input id="perfil-input-email" class="border-b border-outline/20 bg-transparent py-2 px-0" />
        <label class="font-label-sm text-label-sm text-on-surface-variant">cep</label>
        <input id="perfil-input-cep" class="border-b border-outline/20 bg-transparent py-2 px-0" />
        <label class="font-label-sm text-label-sm text-on-surface-variant">número</label>
        <input id="perfil-input-numero" class="border-b border-outline/20 bg-transparent py-2 px-0" />
        <label class="font-label-sm text-label-sm text-on-surface-variant">complemento</label>
        <input id="perfil-input-complemento" class="border-b border-outline/20 bg-transparent py-2 px-0" />
      </div>

      <div class="pt-stack-md">
        <button id="btn-salvar-perfil" class="px-8 py-4 bg-secondary text-on-secondary rounded-full font-label-sm text-label-sm lowercase">salvar</button>
        <div id="perfil-msg" class="hidden font-meta-xs text-meta-xs text-error mt-2"></div>
      </div>
    </section>
  </div>
</div>
